<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackFlow | Powered by V-System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="login-overlay" style="display: none;">
        <div class="login-card">
            <h1 class="brand-title" style="font-size: 2.2em; margin-bottom: 10px;">TrackFlow</h1>
            <p style="color: #64748b; margin-bottom: 25px; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px;">Доступ ограничен</p>
            <input type="password" id="password-input" placeholder="Введите пароль">
            <button class="btn btn-map" onclick="checkPassword()">АВТОРИЗАЦИЯ</button>
            <p id="login-error" style="color: var(--accent); display: none; margin-top: 15px; font-weight: 700; font-size: 0.9em;">ОШИБКА ДОСТУПА</p>
        </div>
    </div>

    <div class="app-header">
        <h1 class="brand-title">TrackFlow</h1>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>

    <!-- Управление и сетка вкладок -->
    <div style="margin-bottom: 15px;">
        <h2 style="margin: 0 0 15px 0;">📦 Управление</h2>
        <div class="tabs">
    <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">🚚 В работе</button>
    <button class="tab-btn" id="tab-archive" onclick="switchTab('archive')">🗄️ Архив</button>
    <button class="tab-btn" id="tab-accounting" onclick="switchTab('accounting')">💰 Финансы</button>
    <button class="tab-btn" id="tab-plan" onclick="switchTab('plan')">📋 План дня</button>
</div>
    </div>

   <!-- ЭКРАН 1: ЗАКАЗЫ -->
    <div id="orders-view">
       <!-- Блок создания заказа (Скрывается в архиве) -->
        <div class="card" id="create-order-form">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">➕ Создать новый заказ</h2>
                <button class="btn" onclick="startVoiceInput()" style="background: var(--accent); padding: 8px 12px; font-size: 1.2em; border: none; border-radius: 8px; cursor: pointer;" title="Голосовой ввод">🎤</button>
            </div>
            
            <input type="text" id="pickup" placeholder="Откуда забрать (например: Москва, Красная площадь, 1)">
            <input type="text" id="delivery" placeholder="Куда доставить (например: Москва, ул. Тверская, 7)">
            <input type="text" id="client" placeholder="Имя клиента">
            <input type="number" id="price" placeholder="Стоимость (₽)">
            <input type="datetime-local" id="deadline-input" style="margin-bottom: 15px; width: 100%; box-sizing: border-box;">
            
            <button class="btn" onclick="createOrder()" style="width: 100%; background: var(--primary); color: var(--bg); border: none;">ОТПРАВИТЬ В БАЗУ</button>
        </div>
        
        <!-- ВОТ ЭТИ ДВЕ СТРОЧКИ СЛУЧАЙНО СТЕРЛИСЬ: -->
        <input type="text" id="search-input" placeholder="🔍 Поиск по клиенту или адресу..." oninput="loadOrders()" style="margin-bottom: 25px;">
        <div id="orders-list">Загрузка...</div>
    </div>

    <!-- ЭКРАН 2: ФИНАНСЫ -->
    <div id="accounting-view" style="display: none;">
        <div class="card" style="border: 1px solid var(--primary);">
            <h2 style="margin-top: 0; color: var(--primary); text-align: center;">📊 Финансовая сводка</h2>
            <div style="display: flex; justify-content: space-between; font-size: 1.1em; margin-bottom: 10px;">
                <span>💰 Доходы:</span>
                <span id="acc-income" style="color: #10b981; font-weight: bold;">0 ₽</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.1em; margin-bottom: 10px;">
                <span>📉 Расходы:</span>
                <span id="acc-expense" style="color: #ef4444; font-weight: bold;">0 ₽</span>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
            <div style="display: flex; justify-content: space-between; font-size: 1.3em;">
                <span>💎 Чистая прибыль:</span>
                <span id="acc-profit" style="color: var(--primary); font-weight: bold;">0 ₽</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; color: var(--text-main);">➕ Добавить трату</h3>
            <input type="text" id="expense-desc" placeholder="На что потратили?">
            <input type="number" id="expense-amount" placeholder="Сумма (₽)">
            <button class="btn" style="width: 100%; background: #ef4444; color: white; border: none; margin: 0;" onclick="addExpense()">Записать расход</button>
        </div>
        <div id="expenses-list"></div>
    </div>

    <!-- ЭКРАН 3: ПЛАН ДНЯ -->
    <div id="plan-view" style="display: none;">
        <div class="card" style="border: 1px solid var(--accent);">
            <h2 style="margin-top: 0; color: var(--accent); text-align: center;">⏰ Напоминание</h2>
            <input type="text" id="task-desc" placeholder="Что нужно сделать?">
            <input type="datetime-local" id="task-time" style="margin-bottom: 15px;">
            <button class="btn" style="width: 100%; background: var(--accent); color: white; border: none; margin: 0;" onclick="addTask()">Записать в план</button>
        </div>
        <div id="tasks-list"></div>
    </div>

    <!-- ПОДВАЛ (Теперь всегда строго внизу) -->
    <div class="app-footer">
        Powered by 
        <span style="font-weight:800; font-size: 1.1em;">
            <span style="color:#00e5ff;">[</span> 
            <span style="color:var(--text-main);">V</span> 
            <span style="color:#f97316;">]</span>
        </span> 
        V-SYSTEM
    </div>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
