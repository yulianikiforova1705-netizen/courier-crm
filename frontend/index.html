<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TrackFlow | Powered by V-System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 Премиальная палитра V-SYSTEM Core */
        :root {
            --primary: #2563eb; 
            --accent: #f97316;
            --success: #059669;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border: rgba(0, 0, 0, 0.05);
        }

        /* 🌙 Темная тема (Cyber/Tech Style) */
        body.dark-theme {
            --bg: #0b1121;
            --card-bg: #151e32;
            --text-main: #e2e8f0;
            --primary: #00e5ff; /* Неоновый циан */
            --accent: #ff6b6b;  /* Коралловый */
            --border: rgba(0, 229, 255, 0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 🏢 Шапка приложения */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-title { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.8em; 
            color: var(--primary); 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-transform: uppercase;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
/* 📑 Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: transparent;
            color: #64748b;
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
        /* Карточки */
        .card, .order-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-theme .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .order-card h3 { margin-top: 0; color: var(--primary); font-size: 1.3em; }

        /* Статусы */
        .status { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 6px; 
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-main); 
            font-weight: 600; 
            font-size: 0.85em; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border);
        }

        /* 🎛 Кнопки */
        .btn { 
            background: transparent;
            color: var(--primary); 
            border: 1px solid var(--primary);
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.9em; 
            font-weight: 700; 
            margin-right: 8px; 
            margin-bottom: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { 
            background: var(--primary); 
            color: var(--bg); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); 
        }

        .btn-complete { border-color: #10b981; color: #10b981; }
        .btn-complete:hover { background: #10b981; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

       .btn-map { 
            background: var(--primary); 
            color: var(--bg); 
            border: none; 
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: block;
            
            /* ✨ ДОБАВЛЯЕМ ЭТИ СТРОКИ: */
            box-sizing: border-box; /* Учитываем внутренние отступы в ширине 100% */
            margin: 0; /* Убираем боковые отступы, из-за которых кнопка выезжала */
            white-space: normal; /* Позволяем длинному тексту переноситься на новую строку */
        }
        
        .btn-map:hover { background: var(--primary); filter: brightness(110%); }

        /* Поля ввода */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 1em; 
            transition: all 0.2s ease;
            background: var(--card-bg);
            color: var(--text-main);
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }
/* 🔐 Экран авторизации */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b1121; /* Всегда темный кибер-фон */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .login-card {
            background: #151e32;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
            width: 90%;
            max-width: 400px;
        }
        .login-card input {
            text-align: center;
            letter-spacing: 2px;
            font-weight: 700;
        }
        /* Подвал */
        .app-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.8em;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с кнопкой темы -->
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="logo" style="font-size: 2rem;">📦</div>
                <h1 style="margin: 0; color: #fff; font-size: 1.5rem;">TrackFlow</h1>
            </div>
            <!-- Вернули кнопку смены темы! -->
            <button onclick="document.body.classList.toggle('light-theme')" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 1.2rem;" title="Сменить тему">🌓</button>
        </div>

        <!-- Вкладки (вернули тег button, чтобы твои стили снова работали!) -->
        <div class="tabs">
            <button class="tab active" id="tab-active" onclick="switchTab('active')">АКТИВНЫЕ</button>
            <button class="tab" id="tab-archive" onclick="switchTab('archive')">АРХИВ</button>
            <button class="tab" id="tab-accounting" onclick="switchTab('accounting')">ФИНАНСЫ</button>
        </div>

        <!-- === ЭКРАН 1: РАБОТА С ЗАКАЗАМИ === -->
        <div id="orders-view">
            <!-- Умный поиск -->
            <div style="position: relative; margin-bottom: 20px;">
                <span style="position: absolute; left: 12px; top: 12px; opacity: 0.5;">🔍</span>
                <input type="text" id="search-input" placeholder="Поиск по клиенту или адресу..." onkeyup="loadOrders()" style="width: 100%; padding: 12px 12px 12px 35px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #fff; box-sizing: border-box; font-family: inherit;">
            </div>

            <!-- Форма создания заказа -->
            <div class="form-group" style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
                <input type="text" id="pickup" placeholder="Откуда забрать" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <input type="text" id="delivery" placeholder="Куда доставить" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <input type="text" id="client" placeholder="Имя клиента" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <input type="number" id="price" placeholder="Стоимость (₽)" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <input type="datetime-local" id="deadline-input" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; color-scheme: dark;">
                <button onclick="createOrder()" style="width: 100%; padding: 12px; background-color: #00e5ff; color: #0a0f1e; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase;">➕ Создать заказ</button>
            </div>
            
            <div id="income-badge" style="display: none; background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
            
            <div id="orders-list"></div>
        </div>

        <!-- === ЭКРАН 2: БУХГАЛТЕРИЯ === -->
        <div id="accounting-view" style="display: none;">
            <div style="background: rgba(255,255,255,0.02); border: 1px solid #00e5ff; margin-bottom: 20px; padding: 15px; border-radius: 8px;">
                <h2 style="margin-top: 0; color: #00e5ff; text-align: center; font-size: 1.3rem;">📊 Финансовая сводка</h2>
                <div style="display: flex; justify-content: space-between; font-size: 1.1em; margin-bottom: 10px;">
                    <span>💰 Доходы:</span>
                    <span id="acc-income" style="color: #10b981; font-weight: bold;">0 ₽</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.1em; margin-bottom: 10px;">
                    <span>📉 Расходы:</span>
                    <span id="acc-expense" style="color: #ef4444; font-weight: bold;">0 ₽</span>
                </div>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
                <div style="display: flex; justify-content: space-between; font-size: 1.3em;">
                    <span>💎 Чистая прибыль:</span>
                    <span id="acc-profit" style="color: #00e5ff; font-weight: bold;">0 ₽</span>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <input type="text" id="expense-desc" placeholder="На что потратили? (например, Бензин)" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <input type="number" id="expense-amount" placeholder="Сумма (₽)" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box;">
                <button onclick="addExpense()" style="width: 100%; padding: 12px; background-color: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase;">➖ Добавить расход</button>
            </div>
            <div id="expenses-list"></div>
        </div>
        
        <!-- Подвал с ПРАВИЛЬНЫМ ЦВЕТОМ (#64748b - красивый стальной оттенок) -->
        <div style="text-align: center; margin-top: 30px; margin-bottom: 20px;">
            <p style="color: #64748b; font-size: 0.75rem; letter-spacing: 2px; margin: 0; font-weight: 600;">POWERED BY <span style="color: #00e5ff; font-weight: bold;">[ V ]</span> V-SYSTEM</p>
        </div>
    </div>
    <script>
        // 🌓 Логика темы
        const themeBtn = document.getElementById('theme-btn');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.innerText = isDark ? '☀️' : '🌙';
        }
        // 🔐 Логика авторизации
        const ACCESS_PASSWORD = "vsystem2026"; // <-- ТВОЙ ПАРОЛЬ ЗДЕСЬ

        function checkAuth() {
            if (localStorage.getItem('trackflow_auth') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                loadOrders(); // Загружаем базу только если пустили
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === ACCESS_PASSWORD) {
                localStorage.setItem('trackflow_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                loadOrders();
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }
// 📑 Логика вкладок
        let currentTab = 'active';
function switchTab(tab) {
            currentTab = tab;
            
            // Убираем подсветку со всех кнопок
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            // Подсвечиваем нажатую
            document.getElementById(`tab-${tab}`).classList.add('active');

            // Переключаем экраны
            if (tab === 'accounting') {
                document.getElementById('orders-view').style.display = 'none';
                document.getElementById('accounting-view').style.display = 'block';
                loadAccounting(); // Считаем деньги!
            } else {
                document.getElementById('orders-view').style.display = 'block';
                document.getElementById('accounting-view').style.display = 'none';
                loadOrders(); // Показываем заказы
            }
        }
        const API_URL = 'https://courier-crm-api.onrender.com'; // Твоя ссылка
        let currentTab = 'active'; // <-- ВСТАВИТЬ СЮДА
        
        async function loadOrders() {
            try {
                const response = await fetch(`${API_URL}/api/orders`);
                const orders = await response.json();

                const searchInput = document.getElementById('search-input');
                const searchQuery = searchInput ? searchInput.value.toLowerCase() : '';

                const filteredOrders = orders.filter(order => {
                    let tabMatch = false;
                    if (currentTab === 'active') {
                        tabMatch = order.status !== 'completed';
                    } else {
                        tabMatch = order.status === 'completed';
                    }
                    const textString = `${order.client_name} ${order.pickup_address} ${order.delivery_address}`.toLowerCase();
                    const searchMatch = textString.includes(searchQuery);
                    return tabMatch && searchMatch;
                });

                let totalIncome = 0;
                orders.forEach(o => {
                    if (o.status === 'completed') {
                        totalIncome += Number(o.price) || 0;
                    }
                });

                const incomeBadge = document.getElementById('income-badge');
                if (incomeBadge) {
                    if (currentTab === 'archive') {
                        incomeBadge.style.display = 'inline-block';
                        incomeBadge.innerText = `💰 Общая выручка: ${totalIncome} ₽`;
                    } else {
                        incomeBadge.style.display = 'none';
                    }
                }

                const list = document.getElementById('orders-list');
                list.innerHTML = '';

                if (filteredOrders.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #888;">Заказов пока нет</p>';
                    return;
                }

                filteredOrders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let timeInfo = '';
                    if (order.status === 'completed' && order.created_at && order.completed_at) {
                        const start = new Date(order.created_at);
                        const end = new Date(order.completed_at);
                        const diffMs = end - start;
                        const diffMins = Math.round(diffMs / 60000);
                        
                        let timeStr = '';
                        if (diffMins < 60) {
                            timeStr = `${diffMins} мин.`;
                        } else {
                            const hours = Math.floor(diffMins / 60);
                            const mins = diffMins % 60;
                            timeStr = `${hours} ч. ${mins} мин.`;
                        }
                        timeInfo = `<p style="color: #00e5ff; font-weight: bold; margin-top: 5px;">⏱ Время выполнения: ${timeStr}</p>`;
                    }

                    let deadlineText = 'Как можно скорее';
                    if (order.deadline) {
                        const dlDate = new Date(order.deadline);
                        if (!isNaN(dlDate)) {
                            deadlineText = dlDate.toLocaleString('ru-RU', {
                                day: 'numeric', month: 'short', 
                                hour: '2-digit', minute:'2-digit'
                            });
                        }
                    }

                   // Принудительно переводим статус в нижний регистр
                    const currentStatus = order.status.toLowerCase();

                    // Бронебойная ссылка для мобильных устройств (поиск адреса)
                    let yandexUrl = '';
                    let routeBtnText = '';
                    
                    if (currentStatus === 'new') {
                        // Передаем адрес забора груза для поиска
                        yandexUrl = `https://yandex.ru/maps/?text=${encodeURIComponent(order.pickup_address)}`;
                        routeBtnText = '📍 Показать откуда забрать';
                    } else {
                        // Передаем адрес клиента для поиска
                        yandexUrl = `https://yandex.ru/maps/?text=${encodeURIComponent(order.delivery_address)}`;
                        routeBtnText = '🏁 Показать куда доставить';
                    }

                    card.innerHTML = `
                        <h3 style="margin-top: 0; color: #00e5ff;">Заказ #${order.id}</h3>
                        
                        <p>👤 <strong>Клиент:</strong> ${order.client_name}</p>
                        <p>💵 <strong>Сумма:</strong> ${order.price || 0} ₽</p>
                        <p>📅 <strong>К какому времени:</strong> <span style="color: #00e5ff;">${deadlineText}</span></p>
                        
                        <div style="margin: 15px 0; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                            <p style="margin-top: 0;">📍 <strong>Откуда:</strong> ${order.pickup_address}</p>
                            <p style="margin-bottom: 0;">🏁 <strong>Куда:</strong> ${order.delivery_address}</p>
                        </div>
                        
                        <p>Статус: <span class="status" style="text-transform: uppercase;">${order.status}</span></p>
                        ${timeInfo}
                        
                        <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                            ${currentStatus === 'new' ? `<button style="background: transparent; color: #00e5ff; border: 1px solid #00e5ff; padding: 10px; border-radius: 6px; cursor: pointer; text-transform: uppercase;" onclick="updateStatus(${order.id}, 'in_progress')">🟡 Взять в работу</button>` : ''}
                            
                            ${currentStatus === 'in_progress' ? `<button style="background: transparent; color: #10b981; border: 1px solid #10b981; padding: 10px; border-radius: 6px; cursor: pointer; text-transform: uppercase;" onclick="updateStatus(${order.id}, 'completed')">🟢 Доставлено</button>` : ''}
                            
                            <a href="${yandexUrl}" target="_blank" style="display: block; text-align: center; text-decoration: none; padding: 10px; border-radius: 6px; background-color: #00e5ff; color: #0a0f1e; font-weight: bold; text-transform: uppercase;">
                                ${routeBtnText}
                            </a>
                        </div>
                    `;
                        
                    list.appendChild(card);
                });
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
            }
        }

        async function createOrder() {
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const client = document.getElementById('client').value;
            const price = document.getElementById('price').value;
            const deadlineVal = document.getElementById('deadline-input').value; // <-- Забираем дату

            if (!pickup || !delivery || !client) return alert('Заполни все поля!');

            await fetch(`${API_URL}/api/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    pickup_address: pickup, 
                    delivery_address: delivery, 
                    client_name: client, 
                    deadline: deadlineVal, // <-- Отправляем дату на сервер
                    client_phone: "Не указан",
                    cargo_details: "Обычная доставка",
                    price: price || 0
                })
            });

            document.getElementById('pickup').value = '';
            document.getElementById('delivery').value = '';
            document.getElementById('client').value = '';
            document.getElementById('price').value = '';
            document.getElementById('deadline-input').value = ''; // Очищаем календарь
            loadOrders();
        }

        // Первый запуск
        checkAuth();

        // 🪄 УМНОЕ автообновление (3 сек)
        setInterval(() => {
            // Защита: не обновляем в фоне, если не авторизованы
            if (localStorage.getItem('trackflow_auth') !== 'true') return;
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const client = document.getElementById('client').value;

            if (pickup === '' && delivery === '' && client === '') {
                loadOrders();
            }
        }, 3000);
        async function loadAccounting() {
            try {
                // Скачиваем доходы (заказы)
                const resOrders = await fetch(`${API_URL}/api/orders`);
                const orders = await resOrders.json();
                
                // Скачиваем расходы
                const resExp = await fetch(`${API_URL}/api/expenses`);
                const expenses = await resExp.json();

                // Считаем доходы (плюсуем только доставленные заказы)
                let totalIncome = 0;
                orders.forEach(o => {
                    if (o.status === 'completed') totalIncome += Number(o.price) || 0;
                });

                // Считаем расходы
                let totalExpense = 0;
                expenses.forEach(e => {
                    totalExpense += Number(e.amount) || 0;
                });

                // Высчитываем чистую прибыль
                const profit = totalIncome - totalExpense;

                // Закидываем цифры в красивый дашборд
                document.getElementById('acc-income').innerText = `${totalIncome} ₽`;
                document.getElementById('acc-expense').innerText = `${totalExpense} ₽`;
                document.getElementById('acc-profit').innerText = `${profit} ₽`;

                // Отрисовываем список трат
                const list = document.getElementById('expenses-list');
                list.innerHTML = '';
                
                if (expenses.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #888;">Расходов пока нет. Вы великолепны! 💰</p>';
                    return;
                }

                expenses.forEach(e => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <p style="margin: 0; font-size: 1.1em;">💸 <strong>${e.description}</strong></p>
                        <p style="margin: 5px 0 0 0; color: #ef4444; font-weight: bold;">- ${e.amount} ₽</p>
                    `;
                    list.appendChild(card);
                });

            } catch (error) {
                console.error('Ошибка загрузки финансов:', error);
            }
        }

        async function addExpense() {
            const desc = document.getElementById('expense-desc').value;
            const amount = document.getElementById('expense-amount').value;

            if (!desc || !amount) return alert('Заполни описание и сумму расхода!');

            await fetch(`${API_URL}/api/expenses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, amount: amount })
            });

            // Очищаем форму и обновляем дашборд
            document.getElementById('expense-desc').value = '';
            document.getElementById('expense-amount').value = '';
            loadAccounting();
        }
    </script>
</body>
</html>
