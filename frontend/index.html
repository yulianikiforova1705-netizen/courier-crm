<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TrackFlow | Powered by V-System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 Премиальная палитра V-SYSTEM Core */
        :root {
            --primary: #2563eb; 
            --accent: #f97316;
            --success: #059669;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border: rgba(0, 0, 0, 0.05);
        }

        /* 🌙 Темная тема (Cyber/Tech Style) */
        body.dark-theme {
            --bg: #0b1121;
            --card-bg: #151e32;
            --text-main: #e2e8f0;
            --primary: #00e5ff; /* Неоновый циан */
            --accent: #ff6b6b;  /* Коралловый */
            --border: rgba(0, 229, 255, 0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 🏢 Шапка приложения */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-title { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.8em; 
            color: var(--primary); 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-transform: uppercase;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Карточки */
        .card, .order-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-theme .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .order-card h3 { margin-top: 0; color: var(--primary); font-size: 1.3em; }

        /* Статусы */
        .status { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 6px; 
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-main); 
            font-weight: 600; 
            font-size: 0.85em; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border);
        }

        /* 🎛 Кнопки */
        .btn { 
            background: transparent;
            color: var(--primary); 
            border: 1px solid var(--primary);
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.9em; 
            font-weight: 700; 
            margin-right: 8px; 
            margin-bottom: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { 
            background: var(--primary); 
            color: var(--bg); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); 
        }

        .btn-complete { border-color: #10b981; color: #10b981; }
        .btn-complete:hover { background: #10b981; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        .btn-map { 
            background: var(--primary); 
            color: var(--bg); 
            border: none; 
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        
        .btn-map:hover { background: var(--primary); filter: brightness(110%); }

        /* Поля ввода */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 1em; 
            transition: all 0.2s ease;
            background: var(--card-bg);
            color: var(--text-main);
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        /* Подвал */
        .app-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.8em;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 class="brand-title">TrackFlow</h1>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>

    <div class="card">
        <h2>➕ Создать новый заказ</h2>
        <input type="text" id="pickup" placeholder="Откуда забрать (например: Москва, Красная площадь, 1)">
        <input type="text" id="delivery" placeholder="Куда доставить (например: Москва, ул. Тверская, 7)">
        <input type="text" id="client" placeholder="Имя клиента">
        <button class="btn" onclick="createOrder()" style="width: 100%; background: var(--primary); color: var(--bg); border: none;">Отправить в базу</button>
    </div>

    <h2>📦 Актуальные заказы</h2>
    <div id="orders-list">Загрузка...</div>

    <div class="app-footer">
        Powered by 
        <span style="font-weight:800; font-size: 1.1em;">
            <span style="color:#00e5ff;">[</span> 
            <span style="color:var(--text-main);">V</span> 
            <span style="color:#f97316;">]</span>
        </span> 
        V-SYSTEM
    </div>

    <script>
        // 🌓 Логика темы
        const themeBtn = document.getElementById('theme-btn');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.innerText = isDark ? '☀️' : '🌙';
        }

        // 📡 ВНИМАНИЕ: Проверь, чтобы тут стояла твоя ссылка на Render!
        const API_URL = 'https://courier-crm-api.onrender.com';

        async function loadOrders() {
            try {
                const response = await fetch(`${API_URL}/api/orders`);
                const orders = await response.json();
                const list = document.getElementById('orders-list');
                list.innerHTML = '';

                orders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = 'order-card';
                    
                    let actionButton = '';
                    if (order.status === 'new') {
                        actionButton = `<button class="btn" onclick="updateOrderStatus(${order.id}, 'in_progress')">🟢 Взять в работу</button>`;
                    } else if (order.status === 'in_progress') {
                        actionButton = `<button class="btn btn-complete" onclick="updateOrderStatus(${order.id}, 'completed')">✅ Доставлено</button>`;
                    }

                    card.innerHTML = `
                        <h3>Заказ #${order.id}</h3>
                        <p>👤 <strong>Клиент:</strong> ${order.client_name}</p>
                        <p>📍 <strong>Откуда:</strong> ${order.pickup_address}</p>
                        <p>🏁 <strong>Куда:</strong> ${order.delivery_address}</p>
                        <p>Статус: <span class="status">${order.status}</span></p>
                        <div style="margin-top: 15px;">
                            ${actionButton}
                        </div>
                        <div style="margin-top: 10px;">
                            <a class="btn btn-map" href="https://yandex.ru/maps/?rtext=${encodeURIComponent(order.pickup_address)}~${encodeURIComponent(order.delivery_address)}" target="_blank">🗺️ Построить маршрут (Я.Карты)</a>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                document.getElementById('orders-list').innerHTML = '<p style="color:red">Ошибка загрузки</p>';
            }
        }

        async function createOrder() {
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const client = document.getElementById('client').value;

            if (!pickup || !delivery || !client) return alert('Заполни все поля!');

            await fetch(`${API_URL}/api/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pickup, delivery, client })
            });

            document.getElementById('pickup').value = '';
            document.getElementById('delivery').value = '';
            document.getElementById('client').value = '';
            loadOrders();
        }

        async function updateOrderStatus(id, status) {
            await fetch(`${API_URL}/api/orders/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        // Первый запуск
        loadOrders();

        // 🪄 УМНОЕ автообновление (3 сек)
        setInterval(() => {
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const client = document.getElementById('client').value;

            if (pickup === '' && delivery === '' && client === '') {
                loadOrders();
            }
        }, 3000);
    </script>
</body>
</html>
