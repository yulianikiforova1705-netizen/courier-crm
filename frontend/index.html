<!DOCTYPE html>
<html lang="ru">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>V-System | Управление доставкой</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        /* 🎨 Премиальная цветовая палитра (Business Class) */
        :root {
            --primary: #1e293b; /* Глубокий темный сланец (Onyx) */
            --accent: #d4af37;  /* Благородное матовое золото */
            --success: #115e59; /* Темный благородный изумруд */
            --warning: #b45309; /* Темная бронза */
            --bg: #f8fafc;      /* Жемчужно-платиновый фон */
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            line-height: 1.6;
        }

        /* Убираем лишние тени у заголовка для большей строгости */
        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 2.5em; 
            margin-bottom: 30px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        h2 { color: var(--text-main); font-weight: 600; }

        /* Элегантные карточки с очень мягкой тенью */
        .card, .order-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        .order-card h3 { margin-top: 0; color: var(--primary); font-size: 1.3em;}

        /* Строгие плашки статусов */
        .status { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 6px; 
            background: #f1f5f9; 
            color: #475569; 
            font-weight: 600; 
            font-size: 0.85em; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #e2e8f0;
        }
        
        /* Кнопки с благородными оттенками */
        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95em; 
            font-weight: 600; 
            margin-right: 8px; 
            margin-bottom: 8px;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }
        .btn:hover { background: #0f172a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30, 41, 59, 0.15); }
        .btn:active { transform: translateY(1px); box-shadow: none; }
        
        .btn-complete { background: var(--success); }
        .btn-complete:hover { background: #042f2e; box-shadow: 0 4px 12px rgba(17, 94, 89, 0.15);}
        
        .btn-map { background: var(--accent); color: #fff; }
        .btn-map:hover { background: #b4850a; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);}
        
        /* Минималистичные поля ввода */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 1em; 
            transition: all 0.2s ease;
            background: #ffffff;
        }
        input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
     /* 🌙 Темная тема (управляется кнопкой) */
        body.dark-theme {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --primary: #f1f5f9;
        }
        
        body.dark-theme .card, body.dark-theme .order-card {
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        body.dark-theme input {
            background: #0f172a;
            color: #f8fafc;
            border-color: #334155;
        }
        
        body.dark-theme input:focus { background: #1e293b; }
        
        body.dark-theme .status {
            background: #334155;
            color: #e2e8f0;
            border-color: #475569;
        }
        
        body.dark-theme .btn { box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        body.dark-theme .btn-map { color: #0f172a; font-weight: 700; }

        /* Стили для новой шапки и кнопки темы */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
       .brand-title { 
         margin: 0; 
         font-family: 'Montserrat', sans-serif; 
         font-size: 2.8em; 
         color: var(--primary); 
         font-weight: 800; 
         letter-spacing: -1px; 
         text-transform: uppercase;
     }
        .app-footer {
         text-align: center;
         margin-top: 40px;
         padding-top: 20px;
         border-top: 1px solid rgba(0,0,0,0.05);
         font-size: 0.8em;
         color: #64748b;
         text-transform: uppercase;
         letter-spacing: 1.5px;
         font-weight: 600;
     }
     body.dark-theme .app-footer { border-color: rgba(255,255,255,0.05); }
        .brand-v { color: var(--accent); font-weight: 700; }
        
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        body.dark-theme .theme-toggle { border-color: #475569; background: #1e293b; }
       
    </style>
</head>
<body>
   <div class="app-header">
        <h1 class="brand-title">TrackFlow</h1>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>

    <div class="card">
        <h2>➕ Создать новый заказ</h2>
        <form id="create-order-form" onsubmit="createOrder(event)">
            <input type="text" id="pickup" placeholder="Откуда забрать (например: Москва, Красная площадь, 1)" required>
            <input type="text" id="delivery" placeholder="Куда доставить (например: Москва, ул. Тверская, 7)" required>
            <input type="text" id="client" placeholder="Имя клиента" required>
            <button type="submit" class="btn">Отправить в базу</button>
        </form>
    </div>

    <h2>📦 Актуальные заказы</h2>
    <div id="orders-list">Загрузка данных...</div>
    <div class="app-footer">
        Система управления от <span class="brand-v">[ V ]</span> V-SYSTEM
    </div>

    <script>
        // 🌓 Логика переключения тем
        const themeBtn = document.getElementById('theme-btn');
        
        // Проверяем, есть ли сохраненная тема при запуске
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeBtn.innerText = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            
            // Сохраняем выбор в память устройства
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            // Меняем иконку
            themeBtn.innerText = isDark ? '☀️' : '🌙';
        }
        // Создание заказа
        async function createOrder(event) {
            event.preventDefault();
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const client = document.getElementById('client').value;
            
            try {
                const response = await fetch('https://courier-crm-api.onrender.com/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pickup_address: pickup,
                        delivery_address: delivery,
                        client_name: client,
                        client_phone: 'Не указан',
                        deadline: new Date(Date.now() + 86400000).toISOString(),
                        cargo_details: 'Стандартная доставка'
                    })
                });
                
                if (response.ok) {
                    document.getElementById('create-order-form').reset();
                    loadOrders();
                } else {
                    alert('Ошибка на сервере при создании заказа');
                }
            } catch (err) {
                console.error(err);
                alert('Ошибка сети');
            }
        }

        // Загрузка заказов
        async function loadOrders() {
            try {
                const response = await fetch('https://courier-crm-api.onrender.com/api/orders');
                const orders = await response.json();
                const listDiv = document.getElementById('orders-list');
                
                listDiv.innerHTML = orders.map(order => {
                    let actionButton = '';
                    if (order.status === 'new') {
                        actionButton = `<button class="btn" onclick="updateStatus(${order.id}, 'in_progress')">🟡 Взять в работу</button>`;
                    } else if (order.status === 'in_progress') {
                        actionButton = `<button class="btn btn-complete" onclick="updateStatus(${order.id}, 'completed')">🟢 Заказ доставлен</button>`;
                    }

                    return `
                    <div class="order-card">
                        <h3>Заказ #${order.id}</h3>
                        <p><strong>👤 Клиент:</strong> ${order.client_name}</p>
                        <p><strong>📍 Откуда:</strong> ${order.pickup_address}</p>
                        <p><strong>🏁 Куда:</strong> ${order.delivery_address}</p>
                        <p><strong>Статус:</strong> <span class="status">${order.status}</span></p>
                        
                        <div style="margin-top: 15px;">
                            ${actionButton}
                        </div>
                        <div style="margin-top: 10px;">
                            <a class="btn btn-map" style="text-decoration: none; display: block; text-align: center;" href="https://yandex.ru/maps/?rtext=${encodeURIComponent(order.pickup_address)}~${encodeURIComponent(order.delivery_address)}" target="_blank">🗺️ Построить маршрут (Я.Карты)</a>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('orders-list').innerHTML = '<p style="color: red;">Ошибка загрузки</p>';
            }
        }

        // Открытие/закрытие карт
        function toggleMap(id, pickup, delivery) {
            const mapDiv = document.getElementById(`map-${id}`);
            if (mapDiv.style.display === 'none' || mapDiv.style.display === '') {
                mapDiv.style.display = 'block';
            } else {
                mapDiv.style.display = 'none';
            }
        }

        // Изменение статуса
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`https://courier-crm-api.onrender.com/api/orders/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) loadOrders();
            } catch (err) {
                console.error(err);
            }
        }
        
        // Загружаем заказы при первом открытии страницы
        loadOrders();
       // 🪄 УМНОЕ автообновление
setInterval(() => {
    const pickup = document.getElementById('pickup').value;
    const delivery = document.getElementById('delivery').value;
    const client = document.getElementById('client').value;

    // Если все поля пустые — обновляем список. Если ты что-то пишешь — ждем.
    if (pickup === '' && delivery === '' && client === '') {
        loadOrders();
    }
}, 3000);
    </script>
</body>
</html>
