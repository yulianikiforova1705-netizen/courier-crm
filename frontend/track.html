<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отслеживание заказа | TrackFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #8b5cf6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 24px; color: var(--primary); }
        h2 { margin: 10px 0 0 0; font-size: 18px; }
        
        /* МАГИЯ АНИМИРОВАННОГО ПОЛЗУНКА */
        .progress-container {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 50px 0;
        }
        .progress-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 100%;
            background: var(--border);
            z-index: 1;
        }
        .progress-bar {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            background: var(--primary);
            z-index: 1;
            transition: width 0.5s ease-in-out;
            width: 0%; /* Стартовое значение */
        }
        .step {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 4px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
            font-size: 14px;
        }
        .step.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
        }
        .step-label {
            position: absolute;
            top: 40px;
            font-size: 12px;
            white-space: nowrap;
            color: var(--text-muted);
            font-weight: 600;
        }
        .step.active .step-label { color: var(--primary); }

        .info-block {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .info-block span { color: var(--text-muted); display: block; margin-bottom: 5px; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px;}
        
        .loader { text-align: center; color: var(--primary); font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 style="font-family: 'Montserrat', sans-serif; color: var(--text-main); opacity: 0.8;">TrackFlow</h1>

    <div class="container" id="tracking-card">
        <div class="loader" id="loader">⏳ Ищем информацию о заказе...</div>
        
        <div id="order-content" style="display: none;">
            <div class="header">
                <h2>Заказ #<span id="display-id"></span></h2>
                <p id="status-text" style="color: var(--text-muted); margin-top: 5px;">Обновление статуса...</p>
            </div>

            <!-- Ползунок -->
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                
                <div class="step" id="step-1">
                    ✓
                    <div class="step-label">Принят</div>
                </div>
                <div class="step" id="step-2">
                    🏃
                    <div class="step-label">В пути</div>
                </div>
                <div class="step" id="step-3">
                    🏁
                    <div class="step-label">Доставлен</div>
                </div>
            </div>

            <div class="info-block">
                <span>📍 Откуда:</span>
                <div id="pickup-address">...</div>
            </div>
            
            <div class="info-block">
                <span>🏁 Куда:</span>
                <div id="delivery-address">...</div>
            </div>
        </div>
    </div>

    <script>
        // 1. Достаем ID заказа из ссылки (например: track.html?id=19)
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');

        if (!orderId) {
            document.getElementById('loader').innerText = '❌ Номер заказа не указан в ссылке';
        } else {
            document.getElementById('display-id').innerText = orderId;
            fetchOrder(); // Запрашиваем сразу
            setInterval(fetchOrder, 5000); // И потом обновляем каждые 5 секунд (магия реального времени!)
        }

        async function fetchOrder() {
            try {
                // Стучимся на твой сервер за конкретным заказом
                const response = await fetch(`https://courier-crm-api.onrender.com/api/orders/${orderId}`);
                if (!response.ok) throw new Error('Заказ не найден');
                
                const order = await response.json();
                
                // Прячем загрузку, показываем контент
                document.getElementById('loader').style.display = 'none';
                document.getElementById('order-content').style.display = 'block';

                // Заполняем адреса
                document.getElementById('pickup-address').innerText = order.pickup_address;
                document.getElementById('delivery-address').innerText = order.delivery_address;

                updateProgressBar(order.status);

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerText = '❌ Заказ не найден или сервер недоступен';
            }
        }

        function updateProgressBar(status) {
            const bar = document.getElementById('progress-bar');
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');
            const step3 = document.getElementById('step-3');
            const statusText = document.getElementById('status-text');

            // Сбрасываем все классы
            step1.classList.remove('active');
            step2.classList.remove('active');
            step3.classList.remove('active');

            // Логика ползунка
            if (status === 'new') {
                bar.style.width = '0%';
                step1.classList.add('active');
                statusText.innerText = 'Упаковываем и ждем курьера 📦';
            } 
            else if (status === 'in_progress') {
                bar.style.width = '50%';
                step1.classList.add('active');
                step2.classList.add('active');
                statusText.innerText = 'Курьер уже мчится к вам! 🏃‍♂️💨';
                statusText.style.color = 'var(--primary)';
            } 
            else if (status === 'completed' || status === 'archive') {
                bar.style.width = '100%';
                step1.classList.add('active');
                step2.classList.add('active');
                step3.classList.add('active');
                statusText.innerText = 'Успешно доставлено! 🎉';
                statusText.style.color = '#10b981'; // Зеленый
            }
        }
    </script>
</body>
</html>
